name: Node.js CI

on:
  push:
    branches: [ "main" ] # ทำงานเมื่อมีการ push โค้ดเข้า branch main

jobs:
  build:
    runs-on: ubuntu-latest # ใช้ Server ฟรีของ GitHub (Ubuntu)

    steps:
    
uses: actions/checkout@v4 # ดึงโค้ดจาก Repo ลงมาที่เครื่อง Build
name: Use Node.js
uses: actions/setup-node@v4
with:
  node-version: '20'
name: Install dependencies
run: npm ci

name: Run Build
run: npm run build --if-present
