<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raika Card Widget</title>
  <meta name="description" content="วิดเจตแสดงผลคิวสำหรับ OBS Stream Overlay - Kerori Raika">
  <link rel="stylesheet" href="style.css">
</head>
<body class="widget-only-body">
  <!-- Capsule Widget -->
  <div class="raika-widget-capsule" id="obsWidgetCapsule">
    <div class="widget-playing" id="obsWidgetPlaying">
      Playing With : <span class="widget-playing-name" id="obsWidgetPlayingName">-</span>
    </div>
    <div class="widget-queue" id="obsWidgetQueue">
      Next Queue : <span class="widget-queue-names" id="obsWidgetQueueNames">-</span>
    </div>
  </div>

  <!-- Socket.io library from CDN (supports loading via file:// protocol) -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <!-- Widget Logic script -->
  <script src="widget.js"></script>
</body>
</html>
